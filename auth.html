<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AquaSmart - Đăng nhập</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <style>
        body.auth-page {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #2196F3 0%, #00bcd4 100%);
            padding: 20px;
        }

        .auth-container {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            padding: 3rem;
            border-radius: 24px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
            width: 100%;
            max-width: 450px;
            text-align: center;
        }

        .auth-logo {
            width: 120px;
            margin-bottom: 2rem;
        }

        .auth-tabs {
            display: flex;
            margin-bottom: 2rem;
            background: #eee;
            border-radius: 12px;
            padding: 4px;
        }

        .auth-tab {
            flex: 1;
            padding: 10px;
            cursor: pointer;
            border-radius: 10px;
            font-weight: 600;
            color: #777;
            transition: 0.3s;
        }

        .auth-tab.active {
            background: #fff;
            color: var(--primary-color);
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
        }

        .auth-form {
            display: none;
            text-align: left;
        }

        .auth-form.active {
            display: block;
        }

        .auth-title {
            margin-bottom: 2rem;
            font-size: 1.5rem;
            font-weight: 700;
        }

        .social-login {
            margin-top: 2rem;
            display: flex;
            justify-content: center;
            gap: 1rem;
        }

        .social-btn {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            border: 1px solid #ddd;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: 0.3s;
        }

        .social-btn:hover {
            background: #f5f5f5;
        }
    </style>
</head>

<body class="auth-page">
    <div class="auth-container">
        <img src="Logo-DH-Su-Pham-Ky-Thuat-TP-Ho-Chi-Minh-HCMUTE-350x449.webp" alt="HCMUTE Logo" class="auth-logo">
        <h2 class="auth-title">Chào mừng đến AquaSmart</h2>

        <div class="auth-tabs">
            <div class="auth-tab active" id="tab-login">Đăng nhập</div>
            <div class="auth-tab" id="tab-register">Đăng ký</div>
        </div>

        <!-- Login Form -->
        <form id="login-form" class="auth-form active">
            <div class="form-group">
                <label>Email</label>
                <input type="email" id="login-email" placeholder="email@hcmute.edu.vn" required>
            </div>
            <div class="form-group">
                <label>Mật khẩu</label>
                <input type="password" id="login-pass" placeholder="••••••••" required>
            </div>
            <button type="button" id="login-btn" class="btn-primary" style="width: 100%;">Đăng nhập</button>
        </form>

        <!-- Register Form -->
        <form id="register-form" class="auth-form">
            <div class="form-group">
                <label>Họ và tên</label>
                <input type="text" id="reg-name" placeholder="Nguyễn Văn A" required>
            </div>
            <div class="form-group">
                <label>Email</label>
                <input type="email" id="reg-email" placeholder="email@hcmute.edu.vn" required>
            </div>
            <div class="form-group">
                <label>Mật khẩu</label>
                <input type="password" id="reg-pass" placeholder="••••••••" required>
            </div>
            <button type="button" id="register-btn" class="btn-primary" style="width: 100%;">Tạo tài khoản</button>
        </form>

        <div class="social-login">
            <div class="social-btn"><i class="fab fa-google" style="color: #db4437;"></i></div>
            <div class="social-btn"><i class="fab fa-facebook-f" style="color: #4267B2;"></i></div>
        </div>
    </div>

    <script>
        const tabLogin = document.getElementById('tab-login');
        const tabRegister = document.getElementById('tab-register');
        const loginForm = document.getElementById('login-form');
        const registerForm = document.getElementById('register-form');

        tabLogin.addEventListener('click', () => {
            tabLogin.classList.add('active');
            tabRegister.classList.remove('active');
            loginForm.classList.add('active');
            registerForm.classList.remove('active');
        });

        tabRegister.addEventListener('click', () => {
            tabRegister.classList.add('active');
            tabLogin.classList.remove('active');
            registerForm.classList.add('active');
            loginForm.classList.remove('active');
        });

        // Authentication Logic
        const loginBtn = document.getElementById('login-btn');
        const registerBtn = document.getElementById('register-btn');

        loginBtn.addEventListener('click', () => {
            const email = document.getElementById('login-email').value;
            const pass = document.getElementById('login-pass').value;
            
            const savedAcc = localStorage.getItem('user_account');
            if (savedAcc) {
                const user = JSON.parse(savedAcc);
                if (user.email === email && user.password === pass) {
                    localStorage.setItem('isLoggedIn', 'true');
                    window.location.href = 'index.html';
                } else {
                    alert('Này! Email hoặc mật khẩu không chính xác!');
                }
            } else {
                alert('Tài khoản chưa tồn tại, vui lòng đăng ký trước.');
            }
        });

        registerBtn.addEventListener('click', () => {
            const name = document.getElementById('reg-name').value;
            const email = document.getElementById('reg-email').value;
            const pass = document.getElementById('reg-pass').value;
            
            if (name && email && pass) {
                const user = { name, email, password: pass };
                localStorage.setItem('user_account', JSON.stringify(user));
                localStorage.setItem('isLoggedIn', 'true');
                alert('Đăng ký tài khoản thành công!');
                window.location.href = 'index.html';
            } else {
                alert('Vui lòng điền đủ thông tin đăng ký!');
            }
        });
    </script>
</body>

</html>
